name: Docker Publish to GHCR

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Se connecter à GHCR
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Extraire les métadonnées (tags, labels)
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      # 4. Builder et pousser l'image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # 5. Cloner le repo k8s
      - name: Checkout k8s repo
        uses: actions/checkout@v4
        with:
          repository: quentinchirol/Yush-kubernetes
          token: ${{ secrets.K8S_REPO_TOKEN }}
          path: k8s-repo

      # 6. Mettre à jour le tag dans deployment.yaml
      - name: Update image tag
        run: |
          sed -i "s|image: ghcr.io/quentinchirol/.*|image: ghcr.io/quentinchirol/portfolio:sha-$(echo ${{ github.sha }} | cut -c1-7)|" k8s-repo/apps/nginx/deployment.yaml

      # 7. Commit et push dans le repo k8s
      - name: Commit and push to k8s repo
        run: |
          cd k8s-repo
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add apps/nginx/deployment.yaml
          git commit -m "ci: update image to sha-$(echo ${{ github.sha }} | cut -c1-7)"
          git push
