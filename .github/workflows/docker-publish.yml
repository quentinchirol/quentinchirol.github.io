# /**
#  * @AI_SPACE
#  * @purpose : Workflow GitHub Actions pour construire et publier l'image Docker
#  * @logic : Se déclenche sur un push vers `main`, build l'image et la pousse sur GHCR (GitHub Container Registry).
#  * @decisions : Utilisation de `ghcr.io` pour un stockage d'image lié au repo. Authentification via le `GITHUB_TOKEN` automatique. Si le repo est privé, le package sera privé par défaut.
#  * @references : https://docs.github.com/en/actions/publishing-packages/publishing-docker-images
#  */

name: Docker Publish to GHCR

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
